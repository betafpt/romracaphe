name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Gradle 8.5 from GitHub Mirror
        run: |
          mkdir -p opt/gradle
          curl -L -o gradle.zip https://github.com/gradle/gradle/releases/download/v8.5.0/gradle-8.5-bin.zip
          unzip -d opt/gradle gradle.zip
          echo "$GITHUB_WORKSPACE/opt/gradle/gradle-8.5/bin" >> $GITHUB_PATH
          rm gradle.zip

      - name: Build Debug APK
        run: |
          cd android-app
          gradle assembleDebug --no-daemon --no-build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: romra-pos-app
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
