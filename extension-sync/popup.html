<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 320px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h3 { margin-top: 0; color: #333; text-align: center; }
        p { font-size: 13px; color: #555; text-align: center; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button.shopee { background-color: #ee4d2d; }
        button.grab { background-color: #00b14f; }
        #status { margin-top: 10px; font-size: 12px; color: #0821D2; word-break: break-all; padding: 10px; background: #f0f0f0; border-radius: 4px; display: none; max-height: 150px; overflow-y: auto;}
    </style>
</head>
<body>
    <h3>Đồng bộ đơn hàng</h3>
    <p>Hãy đăng nhập vào trang quản lý của app trước, sau đó bấm nút tương ứng bên dưới.</p>
    
    <button id="btn-shopee" class="shopee">Lấy Token ShopeeFood</button>
    <button id="btn-grab" class="grab">Lấy Token GrabFood</button>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
